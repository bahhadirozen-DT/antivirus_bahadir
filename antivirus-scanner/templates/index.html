<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>🛡️ SCHEKUR Hibrit Pro Antivirüs</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d1117;
            margin: 40px;
            color: #c9d1d9;
        }
        .container {
            max-width: 1100px;
            background: #161b22;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        input[type="text"] {
            width: 70%;
            padding: 12px;
            font-size: 16px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: white;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #1f6feb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #388bfd;
        }
        .btn-delete {
            background-color: #da3633;
            font-size: 12px;
            padding: 6px 12px;
            margin-left: 10px;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-quarantine {
            background-color: #d29922;
            color: black;
            font-size: 12px;
            padding: 6px 12px;
            margin-left: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-vt {
            background-color: #8957e5;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            margin-left: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-restore {
            background-color: #238636;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        #results {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid #30363d;
            padding-top: 10px;
        }
        .clean {
            color: #58a6ff;
            background: #21262d;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #238636;
        }
        .danger {
            color: #f85149;
            background: #21262d;
            font-weight: bold;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #da3633;
        }
        .warning {
            color: #d29922;
            background: #21262d;
            font-weight: bold;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #d29922;
        }
        .quarantine-section {
            max-width: 1100px;
            background: #161b22;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 30px;
        }
        .quarantine-item {
            background: #0d1117;
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ffc107;
            border: 1px solid #30363d;
        }
        .network-section {
            max-width: 1100px;
            background: #161b22;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 30px;
        }
        .network-item {
            background: #0d1117;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        .ai-box {
            background: #161b22;
            padding: 8px 12px;
            margin-top: 8px;
            border-radius: 4px;
            border: 1px solid #21262d;
            font-size: 13px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡️ SCHEKUR Hibrit Antivirüs Motoru (Pro Sürüm)</h1>
        <input type="text" id="folderPath" placeholder="Örn: C:\\Users\\Asus\\Downloads">
        <button onclick="startScan()">⚡ Derinlemesine Tara</button>
        <h3 id="status" style="color: #58a6ff;"></h3>
        <div id="results"></div>
    </div>

    <div class="network-section">
        <h2>🌐 Canlı Ağ İzleme</h2>
        <button onclick="loadNetworkList()">🔄 Ağ Trafiğini Denetle</button>
        <div id="networkList"></div>
    </div>

    <div class="quarantine-section">
        <h2>☣️ Karantina Yönetim Merkezi</h2>
        <button onclick="loadQuarantineList()">🔄 Listeyi Yenile</button>
        <div id="quarantineList"></div>
    </div>

    <script>
        window.onload = function() {
            loadQuarantineList();
            loadNetworkList();
        };

        async function startScan() {
            var path = document.getElementById('folderPath').value;
            var statusText = document.getElementById('status');
            var resultsDiv = document.getElementById('results');
            
            if (!path) {
                alert("Lütfen bir klasör yolu girin!");
                return;
            }

            statusText.innerText = "⚡ Analiz ediliyor...";
            resultsDiv.innerHTML = "";

            try {
                var response = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                });
                var data = await response.json();
                
                statusText.innerText = "✅ Tarama bitti! " + data.total_scanned + " dosya incelendi.";

                for (var i = 0; i < data.results.length; i++) {
                    var item = data.results[i];
                    var p = document.createElement('p');
                    var encodedPath = btoa(unescape(encodeURIComponent(item.file)));
                    
                    if (item.status === 'INFECTED') {
                        p.className = 'danger';
                    } else if (item.status === 'SUSPICIOUS') {
                        p.className = 'warning';
                    } else {
                        p.className = 'clean';
                    }
                    
                    p.id = 'row-' + i;
                    p.innerHTML = "<span>" + item.status + ": " + item.file + "</span>" +
                                  "<div>" +
                                  "<button class='btn-quarantine' onclick='actionFile(\"quarantine\", \"" + encodedPath + "\", \"row-" + i + "\")'>Karantina</button>" +
                                  "<button class='btn-delete' onclick='actionFile(\"delete\", \"" + encodedPath + "\", \"row-" + i + "\")'>Sil</button>" +
                                  "</div>";
                    resultsDiv.appendChild(p);
                }
            } catch (error) {
                statusText.innerText = "❌ Sunucu bağlantı hatası.";
            }
        }

        async function actionFile(action, encodedPath, rowId) {
            try {
                var response = await fetch('/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, path: encodedPath })
                });
                var data = await response.json();
                alert(data.message);
                location.reload();
            } catch (e) {
                alert("İşlem başarısız.");
            }
        }

        async function loadQuarantineList() {
            var qListDiv = document.getElementById('quarantineList');
            try {
                var response = await fetch('/quarantine_list');
                var data = await response.json();
                qListDiv.innerHTML = "";
                
                for (var i = 0; i < data.length; i++) {
                    var item = data[i];
                    var div = document.createElement('div');
                    div.className = 'quarantine-item';
                    div.innerHTML = "<div><strong>📄 " + item.filename + "</strong><br><small>" + item.orig_path + "</small></div>" +
                                    "<div><button class='btn-restore' onclick='manageQuarantine(\"restore\", \"" + item.id + "\")'>Geri Yükle</button></div>";
                    qListDiv.appendChild(div);
                }
            } catch (e) {
                qListDiv.innerHTML = "Liste yüklenemedi.";
            }
        }

        async function manageQuarantine(action, fileId) {
            try {
                await fetch('/manage_quarantine', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, id: fileId })
                });
                loadQuarantineList();
            } catch (e) {
                alert("İşlem başarısız.");
            }
        }

        async function loadNetworkList() {
            var nListDiv = document.getElementById('networkList');
            try {
                var response = await fetch('/ag_taramasi');
                var data = await response.json();
                nListDiv.innerHTML = "";

                for (var i = 0; i < data.baglantilar.length; i++) {
                    var bag = data.baglantilar[i];
                    var div = document.createElement('div');
                    div.className = 'network-item';
                    div.innerHTML = "<div><strong>⚡ " + bag.program + "</strong> (PID: " + bag.pid + ")<br>" +
                                    "📡 Uzak: " + bag.ip + ":" + bag.port + "</div>" +
                                    "<button class='btn-delete' onclick='killNetworkProcess(\"" + bag.pid + "\")'>❌ Bağlantıyı Kopar</button>" +
                                    "<div class='ai-box'>🤖 " + bag.analysis + "</div>";
                    nListDiv.appendChild(div);
                }
            } catch (e) {
                nListDiv.innerHTML = "Ağ verisi alınamadı.";
            }
        }

        async function killNetworkProcess(pid) {
            if (!confirm("PID " + pid + " işlemini sonlandırmak istediğinize emin misiniz?")) return;
            try {
                var response = await fetch('/kill_network_process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pid: pid })
                });
                var data = await response.json();
                alert(data.message);
                loadNetworkList();
            } catch (e) {
                alert("Bağlantı kesme işlemi başarısız.");
            }
        }
    </script>
</body>
</html>
